name: Atualizar Estatísticas de Futebol

on:
  schedule:
    - cron: '0 11 * * 1'  # toda segunda-feira às 11h UTC (8h Brasília)
  workflow_dispatch:        # botão para rodar manualmente quando quiser

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar biblioteca requests
        run: pip install requests

      - name: Rodar script de coleta
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scripts/update_stats.py

      - name: Salvar JSON atualizado no repositório
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/stats.json
          git diff --staged --quiet || git commit -m "stats: atualização $(date +'%d/%m/%Y')"
          git push
